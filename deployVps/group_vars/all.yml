# ============================================================================
# Variables globales — À PERSONNALISER avant le premier déploiement
# Générer les secrets : openssl rand -hex 16
# Pour chiffrer ce fichier : ansible-vault encrypt group_vars/all.yml
# ============================================================================

# --- Identité du serveur ---
admin_email: "your-email@example.com"       # Email pour Let's Encrypt (obligatoire en HTTPS)
base_domain: "example.com"                  # Domaine de base (ex: monserveur.com, pi.home)

# --- Mode de déploiement ---
# true  = HTTPS avec Let's Encrypt (nécessite un vrai domaine + DNS configuré)
# false = HTTP uniquement (pour test local : VM, Pi, etc.)
enable_https: false

# --- Versions (pinnées pour la reproductibilité) ---
traefik_version: "3.4"                      # https://github.com/traefik/traefik/releases
crowdsec_version: "v1.6.8"                  # https://github.com/crowdsecurity/crowdsec/releases
grafana_version: "11.5.2"                   # https://github.com/grafana/grafana/releases
prometheus_version: "v3.2.1"                # https://github.com/prometheus/prometheus/releases
node_exporter_version: "v1.9.0"             # https://github.com/prometheus/node_exporter/releases

# --- Secrets (À CHANGER IMPÉRATIVEMENT) ---
crowdsec_lapi_key: "CHANGE_ME"              # openssl rand -hex 16
grafana_admin_password: "CHANGE_ME"         # Mot de passe admin Grafana

# --- SSH ---
ssh_port: 22                                # Port SSH (changer sur un VPS exposé, ex: 2222)

# --- Chemins ---
stack_dir: "/opt/stack"                     # Répertoire de la stack Docker sur le serveur

# --- Sous-domaines des services (personnalisables) ---
bentopdf_subdomain: "pdf"                   # pdf.example.com
grafana_subdomain: "dashboard"              # stats.example.com

# --- Services optionnels ---
enable_bentopdf: true                       # Application BentoPDF
enable_node_exporter: true                  # Métriques système (CPU, RAM, disque) dans Grafana

# --- VPN NetBird (optionnel) ---
# NetBird crée un réseau VPN mesh pour accéder au serveur de manière sécurisée
# Doc : https://netbird.io/
enable_netbird: false                       # Installer et configurer NetBird
netbird_setup_key: ""                       # Clé de setup depuis https://app.netbird.io/
# Restreindre SSH au VPN uniquement (garder un accès console VPS en secours)
restrict_ssh_to_vpn: false
netbird_vpn_network: "100.64.0.0/10"       # Réseau VPN NetBird par défaut

