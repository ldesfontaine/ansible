# ============================================================================
# Système — Mise à jour, outils de base, firewall, mises à jour automatiques
# ============================================================================

# Mise à jour du cache APT (max 1h de cache)
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

# Appliquer les mises à jour de sécurité en attente
- name: Upgrade all packages to latest
  apt:
    upgrade: safe

# Outils nécessaires au fonctionnement du playbook et du serveur
- name: Install base tools
  apt:
    name:
      - curl
      - ufw                       # Firewall simplifié
      - python3-pip               # Requis par certains modules Ansible
      - git
      - nftables                  # Backend firewall pour le bouncer CrowdSec
      - gnupg                     # Gestion des clés GPG (repos Docker/CrowdSec)
      - unattended-upgrades       # Mises à jour de sécurité automatiques
      - apt-listchanges           # Changelogs des mises à jour
    state: present

# --- Mises à jour automatiques de sécurité ---
# Active la vérification quotidienne + application auto des patches sécurité
- name: Enable unattended-upgrades
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'

# Sources autorisées : sécurité OS + dépôt Docker officiel
# → Corrige automatiquement les CVE Docker Engine sous 24h
- name: Configure unattended-upgrades sources
  copy:
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}";
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
        "Docker:${distro_codename}";
      };
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: '0644'

# --- Firewall UFW ---
# Politique : DENY ALL par défaut, puis on ouvre uniquement ce qui est nécessaire
- name: UFW - Allow SSH
  ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: UFW - Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: UFW - Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: enable_https

# Si VPN activé + restriction SSH → n'autoriser SSH que depuis le réseau VPN
- name: UFW - Restrict SSH to VPN only
  ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    from_ip: "{{ netbird_vpn_network }}"
  when: enable_netbird and restrict_ssh_to_vpn

- name: UFW - Remove open SSH rule (VPN restriction active)
  ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    delete: yes
    from_ip: any
  when: enable_netbird and restrict_ssh_to_vpn
  ignore_errors: yes

- name: UFW - Allow NetBird WireGuard port
  ufw:
    rule: allow
    port: "51820"
    proto: udp
  when: enable_netbird

- name: UFW - Enable with deny-all policy
  ufw:
    state: enabled
    policy: deny
