<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansible Stack Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>⚡ Ansible Stack Builder</h1>
        <p class="subtitle">Cochez vos services, configurez, téléchargez votre stack Ansible prête à déployer.</p>
    </header>

    <main id="app">
        <div class="loading" id="loading">Chargement des services…</div>

        <!-- 1. Grille de services (Ninite-style checkboxes) -->
        <section id="services-section" class="section">
            <h2 class="section-title">1. Choisissez vos services</h2>
            <div id="services-grid" class="services-grid"></div>
        </section>

        <!-- Warnings -->
        <div id="warnings" class="warnings hidden"></div>

        <!-- 2. Configuration dynamique -->
        <section id="config-section" class="section hidden"></section>

        <!-- 3. Versions (visible seulement si services avec version) -->
        <section id="versions-section" class="section hidden">
            <h2 class="section-title">📌 Versions</h2>
            <div class="version-toggle">
                <label>
                    <input type="checkbox" id="use_latest"> Utiliser <code>latest</code> pour tout
                </label>
            </div>
            <div id="versions-grid" class="config-grid"></div>
        </section>

        <!-- Bouton de génération -->
        <div class="generate-section">
            <button id="generate-btn" class="generate-btn" disabled>
                <span class="btn-icon">📥</span>
                <span class="btn-text">Générer & Télécharger</span>
            </button>
            <p id="generate-status" class="generate-status"></p>
        </div>
    </main>

    <footer>
        <p>Ansible Stack Builder — Sécurité par défaut 🛡️</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
